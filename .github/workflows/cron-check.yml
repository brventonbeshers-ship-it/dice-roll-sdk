name: Periodic Health Check

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Package health verification
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
        continue-on-error: true

      - name: Create clean directory
        run: mkdir -p /tmp/dice-roll-health
        continue-on-error: true

      - name: Initialize fresh project
        working-directory: /tmp/dice-roll-health
        run: npm init -y
        continue-on-error: true

      - name: Install dice-roll-sdk from registry
        working-directory: /tmp/dice-roll-health
        run: npm install dice-roll-sdk
        continue-on-error: true

      - name: Verify require works
        working-directory: /tmp/dice-roll-health
        run: node -e "const sdk = require('dice-roll-sdk'); console.log('Health check passed - dice-roll-sdk loaded');"
        continue-on-error: true

      - name: Display installed version
        working-directory: /tmp/dice-roll-health
        run: npm ls dice-roll-sdk
        continue-on-error: true

      - name: Inspect package files
        working-directory: /tmp/dice-roll-health
        run: ls -R node_modules/dice-roll-sdk/
        continue-on-error: true
